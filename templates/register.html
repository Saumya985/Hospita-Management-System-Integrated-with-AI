<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Hospital System</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
border-radius:8px;
box-shadow:0 0 12px rgba(0,0,0,0.1);
width:360px;
}

h2{
text-align:center;
margin-bottom:25px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#28a745;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#1e7e34;
}

.login-link{
text-align:center;
margin-top:15px;
}

.login-link a{
color:#007BFF;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

</style>

</head>


<body>

<div class="container">

<h2>Create Account</h2>

<form method="POST" action="/register">

<label>Reference Number</label>
<input type="text" 
name="Reference_No" 
value="{{ ref_no }}"
readonly>

<label>Password</label>
<input type="password" name="password" required>

<input type="hidden" name="role" value="patient">

<button type="submit">Register</button>

</form>

<div class="login-link">

Already have an account?  
<a href="/login">Login here</a>

</div>

</div>

</body>

</html>
